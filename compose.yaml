services:
  dns:
    image: technitium/dns-server:latest
    container_name: technitium-dns
    hostname: technitium-dns
    ports:
      - "${DNS_PORT:-53}:53/udp"
      - "${DNS_PORT:-53}:53/tcp"
      - "${WEB_PORT:-5380}:5380/tcp"
    environment:
      - TZ=${TZ:-Europe/Berlin}
    volumes:
      - technitium-config:/etc/dns
    restart: unless-stopped

volumes:
  technitium-config:
